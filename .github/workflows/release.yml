name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          # GitHub Actions 使用官方源，避免 .npmrc 国内镜像导致 electron 下载失败
          if (Test-Path .npmrc) { Rename-Item .npmrc .npmrc.bak }
          npm ci
          if (Test-Path .npmrc.bak) { Rename-Item .npmrc.bak .npmrc }

      - name: Rebuild native modules
        run: npm run electron:rebuild

      - name: Build Windows zip
        shell: pwsh
        run: |
          if (Test-Path .npmrc) { Rename-Item .npmrc .npmrc.bak }
          npm run pack:win:zip
          if (Test-Path .npmrc.bak) { Rename-Item .npmrc.bak .npmrc }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
